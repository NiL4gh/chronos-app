<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos — Time Tracking & Invoicing</title>
  <meta name="description" content="Track your time, bill smarter. Chronos helps teams log hours, manage projects, and generate invoices.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #f8f8fa;
      --bg-surface: #ffffff;
      --border-default: #e7e7ea;
      --text-primary: #1c1c1e;
      --text-secondary: #57575c;
      --text-muted: #9a9aa2;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --accent-subtle: rgba(245, 158, 11, 0.14);
      --accent-border: rgba(245, 158, 11, 0.42);
      --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.08), 0 1px 2px -1px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.08), 0 2px 6px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 24px -4px rgba(0,0,0,0.08), 0 4px 10px -4px rgba(0,0,0,0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base: #0a0a0b;
        --bg-surface: #141416;
        --border-default: #2a2a2e;
        --text-primary: #f0f0f2;
        --text-secondary: #a0a0a8;
        --text-muted: #6b6b73;
        --accent: #f59e0b;
        --accent-hover: #fbbf24;
        --accent-subtle: rgba(245, 158, 11, 0.12);
        --accent-border: rgba(245, 158, 11, 0.35);
        --shadow-sm: 0 1px 3px 0 rgba(0,0,0,0.3);
        --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.4);
        --shadow-lg: 0 10px 24px -4px rgba(0,0,0,0.5);
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse at center, var(--accent-subtle) 0%, transparent 70%);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px var(--accent-subtle), var(--shadow-md);
    }

    .logo svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    /* Heading */
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .tagline {
      font-size: 1.125rem;
      color: var(--text-secondary);
      font-weight: 400;
      max-width: 360px;
      margin: 0 auto 2.5rem;
      line-height: 1.5;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.15s ease;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-md); }

    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }
    .btn-secondary:hover { opacity: 0.85; }

    .btn svg { width: 16px; height: 16px; }

    /* Features strip */
    .features {
      display: flex;
      gap: 2rem;
      margin-top: 3.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .feature svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--accent); }

    @media (max-width: 480px) {
      h1 { font-size: 1.75rem; }
      .tagline { font-size: 1rem; }
      .features { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <main class="container">
    <!-- Logo -->
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>

    <!-- Copy -->
    <h1>Chronos</h1>
    <p class="tagline">Track your time, bill smarter. Log hours, manage projects, and generate invoices — all in one place.</p>

    <!-- CTA -->
    <div class="actions">
      <a href="https://chronos-demo.vercel.app" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Launch Demo
      </a>
      <a href="https://chronos-app.vercel.app/login" class="btn btn-secondary">
        Sign In
      </a>
    </div>

    <!-- Features -->
    <div class="features">
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Time Tracking
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Team Management
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Invoicing
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        Reports
      </div>
    </div>
  </main>

  <footer>
    Built by <a href="https://github.com/NiL4gh/chronos-time-tracker" target="_blank" rel="noopener">Niloy</a>
  </footer>
</body>
</html>
